<!DOCTYPE html>
<html class="no-js" lang="ko">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>우리의 작은 기적</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="우리 가족의 소중한 임신 소식" />

  <link href="https://fonts.googleapis.com/css?family=Work+Sans:400,500,700" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com/css?family=Sacramento" rel="stylesheet">

  <link rel="stylesheet" href="css/animate.css">
  <link rel="stylesheet" href="css/icomoon.css">
  <link rel="stylesheet" href="css/bootstrap.css">
  <link rel="stylesheet" href="css/magnific-popup.css">
  <link rel="stylesheet" href="css/owl.carousel.min.css">
  <link rel="stylesheet" href="css/owl.theme.default.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/modernizr-2.6.2.min.js"></script>

  <style>
    .mini-nav { display:none !important; }
    .music-fab {
      position: fixed; right: 16px; bottom: 18px; z-index: 9999;
      border: 0; border-radius: 999px; padding: 12px 16px;
      font-size: 16px; font-weight: 700; background: #f85a40; color: #fff;
      box-shadow: 0 10px 24px rgba(0,0,0,.2);
    }
    .simple-note { font-size: 20px; line-height: 1.8; color: #555; }
    .simple-title { font-size: 52px; }
    .hero-sub { font-size: 28px; margin-top: 10px; }
    .gallery-grid img { width:100%; border-radius: 8px; margin-bottom: 12px; }
    @media (max-width: 768px){
      .simple-title { font-size: 44px; }
      .hero-sub { font-size: 24px; }
      .simple-note { font-size: 19px; }
    }
  </style>
</head>
<body>
  <div class="fh5co-loader"></div>

  <div id="page">
    <header id="fh5co-header" class="fh5co-cover" role="banner" style="background-image:url(images/family-1.jpg);" data-stellar-background-ratio="0.5">
      <div class="overlay"></div>
      <div class="container">
        <div class="row">
          <div class="col-md-10 col-md-offset-1 text-center">
            <div class="display-t">
              <div class="display-tc animate-box" data-animate-effect="fadeIn">
                <h1 class="simple-title">우리의 작은 기적</h1>
                <h2 class="hero-sub">우리에게 소중한 아기가 찾아왔어요</h2>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <div id="fh5co-couple">
      <div class="container">
        <div class="row">
          <div class="col-md-10 col-md-offset-1 text-center fh5co-heading animate-box">
            <h2>기쁜 소식 전해요</h2>
            <p class="simple-note">사랑으로 기다리던 아기가 저희에게 와주었어요.<br>조심스럽고 감사한 마음으로 하루하루를 보내고 있습니다.<br>함께 축복해주시면 큰 힘이 됩니다.</p>
          </div>
        </div>
      </div>
    </div>

    <div id="fh5co-gallery" class="fh5co-section-gray">
      <div class="container">
        <div class="row">
          <div class="col-md-8 col-md-offset-2 text-center fh5co-heading animate-box">
            <span>Our Baby</span>
            <h2>초음파 사진</h2>
          </div>
        </div>
        <div class="row gallery-grid animate-box">
          <div class="col-sm-4"><img src="images/ultrasound-1.jpg" alt="초음파 사진 1"></div>
          <div class="col-sm-4"><img src="images/ultrasound-2.jpg" alt="초음파 사진 2"></div>
          <div class="col-sm-4"><img src="images/family-1.jpg" alt="가족 사진"></div>
        </div>
      </div>
    </div>

    <div id="fh5co-started" class="fh5co-bg" style="background-image:url(images/family-1.jpg);">
      <div class="overlay"></div>
      <div class="container">
        <div class="row animate-box">
          <div class="col-md-10 col-md-offset-1 text-center fh5co-heading">
            <h2>감사 인사</h2>
            <p class="simple-note" style="color:#fff;">늘 응원해 주시고 사랑해 주셔서 감사합니다.<br>건강하고 행복한 모습으로 인사드릴게요 💛</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <button id="musicToggle" class="music-fab">🎵 음악 듣기</button>
  <audio id="bgm" src="audio/bgm.wav" loop preload="none"></audio>

  <script src="js/jquery.min.js"></script>
  <script src="js/jquery.easing.1.3.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/jquery.waypoints.min.js"></script>
  <script src="js/owl.carousel.min.js"></script>
  <script src="js/jquery.countTo.js"></script>
  <script src="js/jquery.stellar.min.js"></script>
  <script src="js/jquery.magnific-popup.min.js"></script>
  <script src="js/magnific-popup-options.js"></script>
  <script src="js/main.js"></script>
  <script>
    const btn = document.getElementById('musicToggle');
    const bgm = document.getElementById('bgm');
    let on = false;
    btn.addEventListener('click', async () => {
      try {
        if (!on) { await bgm.play(); on = true; btn.textContent = '⏸️ 음악 멈추기'; }
        else { bgm.pause(); on = false; btn.textContent = '🎵 음악 듣기'; }
      } catch (e) { alert('음악 파일 재생에 실패했어요.'); }
    });
  </script>
</body>
</html>
