<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>우리 아기 첫 생일 초대장</title>
  <meta name="theme-color" content="#fff7ef" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#fff7ef;--card:#fff;--text:#2b2622;--muted:#76695f;--accent:#ff8f6b;--line:#f3e2d2}
    *{box-sizing:border-box} html,body{margin:0;padding:0}
    body{font-family:'Pretendard',sans-serif;background:linear-gradient(180deg,#fff8f1,#fffefc);color:var(--text);font-size:18px;line-height:1.7}
    .wrap{width:min(92vw,760px);margin:0 auto 110px}
    .hero{position:relative;min-height:72vh;display:flex;align-items:flex-end;border-radius:0 0 28px 28px;overflow:hidden}
    .hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .hero:after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.08),rgba(0,0,0,.55))}
    .hero-copy{position:relative;z-index:2;color:#fff;padding:24px 18px 28px}
    .chip{display:inline-block;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.5);padding:6px 12px;border-radius:999px;font-size:13px;font-weight:700}
    h1{font-family:'Gowun Batang',serif;font-size:clamp(38px,9vw,60px);line-height:1.15;margin:10px 0 8px}
    .sub{font-size:clamp(20px,4.7vw,28px);margin:0}
    .card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:22px 18px;margin:14px 0;box-shadow:0 12px 30px rgba(120,90,60,.08)}
    h2{font-size:clamp(26px,6vw,34px);margin:0 0 10px;font-weight:800}
    .muted{color:var(--muted)}
    .info{display:grid;gap:10px}.info div{display:flex;gap:10px;align-items:flex-start;padding:12px;border:1px solid var(--line);border-radius:14px}
    .gallery{display:grid;grid-auto-flow:column;grid-auto-columns:82%;gap:12px;overflow:auto;scroll-snap-type:x mandatory}
    .gallery img{width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:14px;scroll-snap-align:center;background:#f4ede7}
    .music{position:fixed;right:14px;bottom:calc(14px + env(safe-area-inset-bottom));z-index:99;border:0;border-radius:999px;padding:14px 17px;font-size:16px;font-weight:800;background:var(--accent);color:#fff;box-shadow:0 10px 24px rgba(0,0,0,.2)}
    .reveal{opacity:0;transform:translateY(12px);transition:all .7s ease}.reveal.show{opacity:1;transform:none}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero reveal">
      <img src="images/family-1.jpg" alt="아기 가족 사진" />
      <div class="hero-copy">
        <span class="chip">1st Birthday Invitation</span>
        <h1>우리 아기<br>첫 돌잔치</h1>
        <p class="sub">소중한 첫 생일에 여러분을 초대합니다</p>
      </div>
    </section>

    <section class="card reveal">
      <h2>초대합니다</h2>
      <p class="muted">사랑으로 자란 우리 아기의 첫 번째 생일을 맞아 작은 자리를 마련했어요. 오셔서 따뜻한 축하를 함께 나눠주세요 💛</p>
    </section>

    <section class="card reveal">
      <h2>행사 안내</h2>
      <div class="info muted">
        <div><strong>📅 일시</strong><span>2026년 00월 00일 (토) 오후 12:00</span></div>
        <div><strong>📍 장소</strong><span>OOO 돌잔치홀 / OOO점</span></div>
        <div><strong>👶 아기</strong><span>OOO (태명: 작은기적)</span></div>
      </div>
    </section>

    <section class="card reveal">
      <h2>사진</h2>
      <div class="gallery">
        <img src="images/ultrasound-1.jpg" alt="사진 1">
        <img src="images/ultrasound-2.jpg" alt="사진 2">
        <img src="images/family-1.jpg" alt="사진 3">
      </div>
      <p class="muted" style="font-size:14px;margin-top:8px">좌우로 밀어서 사진을 볼 수 있어요</p>
    </section>

    <section class="card reveal">
      <h2>감사 인사</h2>
      <p class="muted">늘 아껴주시고 응원해주셔서 감사합니다. 건강하고 행복한 모습으로 반갑게 인사드릴게요.</p>
    </section>
  </main>

  <button id="musicToggle" class="music">🎵 음악 듣기</button>
  <audio id="bgm" src="audio/bgm.wav" loop preload="none"></audio>

  <script>
    const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('show');io.unobserve(e.target)}}),{threshold:.14});
    document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
    const btn=document.getElementById('musicToggle');const bgm=document.getElementById('bgm');let on=false;
    btn.addEventListener('click',async()=>{try{if(!on){await bgm.play();on=true;btn.textContent='⏸️ 음악 멈추기'}else{bgm.pause();on=false;btn.textContent='🎵 음악 듣기'}}catch(e){alert('음악 파일 재생에 실패했어요.')}})
  </script>
</body>
</html>
